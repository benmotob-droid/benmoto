const log=document.getElementById('log'), bar=document.getElementById('bar');

function addLog(msg,cls=''){const p=document.createElement('p');p.className=cls;p.textContent=msg;log.appendChild(p);log.scrollTop=log.scrollHeight;}
function setBar(pct){bar.style.width=pct+'%';}

auth.onAuthStateChanged(u=>{
  if(u){
    document.getElementById('loginBox').style.display='none';
    document.getElementById('btnStart').disabled=false;
    document.getElementById('btnStart').textContent='▶ Iniciar importación';
    log.innerHTML='';
    addLog('✓ Sesión activa: '+u.email,'ok');
    addLog('Todo listo. Presiona el botón para cargar los datos.','info');
  }else{
    document.getElementById('loginBox').style.display='block';
    document.getElementById('btnStart').disabled=true;
    document.getElementById('btnStart').textContent='⏳ Esperando sesión...';
  }
});

async function doLogin(){
  const btn=document.getElementById('btnLogin');
  btn.disabled=true; btn.textContent='Iniciando...';
  try{
    await auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value);
  }catch(e){
    addLog('✗ '+e.message,'err');
    btn.disabled=false; btn.textContent='🔐 Iniciar sesión';
  }
}

async function batchWrite(col, items, offset, total){
  const CHUNK=400;
  for(let i=0;i<items.length;i+=CHUNK){
    const batch=db.batch();
    const chunk=items.slice(i,i+CHUNK);
    for(const item of chunk) batch.set(db.collection(col).doc(String(item.id)),item,{merge:true});
    await batch.commit();
    const done=offset+Math.min(i+CHUNK,items.length);
    setBar(Math.round(done/total*100));
    addLog(`  ✓ ${col}: ${Math.min(i+CHUNK,items.length)}/${items.length}`,'ok');
  }
}

async function start(){
  const btn=document.getElementById('btnStart');
  btn.disabled=true; btn.textContent='Importando...';
  log.innerHTML='';
  const total=DATA.clientes.length+DATA.creditos.length+DATA.pagos.length;
  addLog(`Iniciando: ${DATA.clientes.length} clientes · ${DATA.creditos.length} créditos · ${DATA.pagos.length} pagos`,'info');
  addLog('─────────────────────────────','');
  try{
    await batchWrite('clientes',DATA.clientes,0,total);
    await batchWrite('creditos',DATA.creditos,DATA.clientes.length,total);
    await batchWrite('pagos',DATA.pagos,DATA.clientes.length+DATA.creditos.length,total);
    setBar(100);
    addLog('─────────────────────────────','');
    addLog('🎉 ¡IMPORTACIÓN COMPLETADA!','ok');
    addLog(`${DATA.clientes.length} clientes · ${DATA.creditos.length} créditos · ${DATA.pagos.length} pagos subidos a Firebase`,'ok');
    addLog('Ahora ve a la app → Configuración → Sincronizar con Firebase','info');
    btn.textContent='✓ Completado';
  }catch(e){
    addLog('✗ ERROR: '+e.message,'err');
    btn.disabled=false; btn.textContent='▶ Reintentar';
  }
}
