.total-box.rojo .total-n{color:#E5142E}
.total-l{font-size:11px;color:#555;margin-top:2px}
button{width:100%;padding:14px;background:#E5142E;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
button:disabled{background:#333;cursor:not-allowed;color:#666}
.progress{width:100%;background:#222;border-radius:6px;height:10px;margin:12px 0;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#E5142E,#ff6b6b);border-radius:6px;width:0%;transition:width .3s}
.log{margin-top:14px;background:#0a0a0a;border:1px solid #1e1e1e;border-radius:10px;padding:14px;max-height:300px;overflow-y:auto;font-family:monospace;font-size:12px;line-height:1.7}
.log p{margin:0}
.ok{color:#4caf50}.err{color:#f44336}.info{color:#64b5f6}.warn{color:#ffa726}
.login-box{background:#0f0f0f;border:1px solid #2a2a2a;border-radius:10px;padding:16px;margin-bottom:16px}
.login-box input{width:100%;padding:10px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#eee;font-size:13px;margin:6px 0 12px}
.login-box label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.5px}
.login-box button{margin-top:4px}
</style>

firebase.initializeApp(CFG);
const auth = firebase.auth();
const db = firebase.firestore();
const log = document.getElementById('log');
const bar = document.getElementById('bar');

function addLog(msg, cls=''){
  const p=document.createElement('p'); p.className=cls; p.textContent=msg;
  log.appendChild(p); log.scrollTop=log.scrollHeight;
}
function setBar(pct){ bar.style.width=pct+'%'; }

auth.onAuthStateChanged(u=>{
  if(u){
    document.getElementById('loginBox').style.display='none';
    document.getElementById('btnStart').disabled=false;
    document.getElementById('btnStart').textContent='▶ Iniciar importación';
    log.innerHTML='';
    addLog('✓ Sesión activa: '+u.email,'ok');
    addLog('Listo. Presiona el botón para importar.','info');
  } else {
    document.getElementById('loginBox').style.display='block';
    document.getElementById('btnStart').disabled=true;
    document.getElementById('btnStart').textContent='⏳ Esperando sesión...';
  }
});

async function doLogin(){
  const btn=document.getElementById('btnLogin');
  btn.disabled=true; btn.textContent='Iniciando...';
  try{
    await auth.signInWithEmailAndPassword(
      document.getElementById('email').value,
      document.getElementById('pass').value
    );
  } catch(e){
    addLog('✗ '+e.message,'err');
    btn.disabled=false; btn.textContent='🔐 Iniciar sesión';
  }
}

async function batchWrite(col, items){
  const CHUNK=400;
  let done=0;
  for(let i=0;i<items.length;i+=CHUNK){
    const batch=db.batch();
    for(const item of items.slice(i,i+CHUNK)){
      batch.set(db.collection(col).doc(String(item.id)), item, {merge:true});
    }
    await batch.commit();
    done+=Math.min(CHUNK,items.length-i);
    addLog(`  ✓ ${col} ${done}/${items.length}`,'ok');
  }
}

async function start(){
  const btn=document.getElementById('btnStart');
  btn.disabled=true; btn.textContent='Importando...';
  log.innerHTML='';
  const total=DATA.clientes.length+DATA.creditos.length+DATA.pagos.length;
  let done=0;

  addLog(`Iniciando: ${DATA.clientes.length} clientes · ${DATA.creditos.length} créditos · ${DATA.pagos.length} pagos`,'info');

  addLog('--- Clientes ---','info');
  await batchWrite('clientes', DATA.clientes);
  done+=DATA.clientes.length; setBar(Math.round(done/total*100));

  addLog('--- Créditos ---','info');
  await batchWrite('creditos', DATA.creditos);
  done+=DATA.creditos.length; setBar(Math.round(done/total*100));

  addLog('--- Pagos ---','info');
  await batchWrite('pagos', DATA.pagos);
  done+=DATA.pagos.length; setBar(100);

  addLog('','');
  addLog('🎉 ¡IMPORTACIÓN COMPLETADA!','ok');
  addLog(`   ${DATA.clientes.length} clientes · ${DATA.creditos.length} créditos · ${DATA.pagos.length} pagos cargados`,'ok');
  addLog('Ahora ve a la app → Configuración → Sincronizar con Firebase','info');
  btn.textContent='✓ Completado';
}
</script>
